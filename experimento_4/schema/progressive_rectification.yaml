technique: progressive_rectification
name: "Progressive Rectification Prompting — Container-Aware Priority"
description: >
  Progressive Rectification Prompting (PRP) para classificação de Priorização
  Container-Aware (E4). Mascara progressivamente palavras-chave da categoria
  escolhida e força reclassificação, quebrando o anchor bias na aplicação
  de regras compostas da taxonomia de priorização em containers Docker.
acronym: "PRP"
strategy: progressive_rectification

prompt_text: |
  You are a DevSecOps expert specialized in container security and vulnerability prioritization.
  Classify the remediation urgency of the vulnerability described below in the context of Docker containers.

  Vulnerability Information:
  {input_framework}

  Container-Aware Priority taxonomy:
  - Crítico-Container: CVSS ≥ 9.0 AND Solution Type = WillNotFix AND Port Protocol = tcp.
  - Alto-Remediável: CVSS ≥ 7.0 AND Solution Type = VendorFix.
  - Médio-Monitorar: CVSS ∈ [4.0, 7.0) OR exploitation requires specific conditions.
  - Baixo-Aceitar: CVSS < 4.0 OR QoD < 50.

  Think step by step:
  1. Extract CVSS score, Solution Type, Port Protocol, and QoD.
  2. Apply the taxonomy rules in priority order.
  3. Select the highest-priority matching category.

  {output_format}

masking_template: |
  {input_framework}
  Replace all occurrences of the word '{subcategory}' with 'X' in the vulnerability text above.
  Ensure the substitution preserves the original context and sentence structure.

rectification_template: |
  You are a DevSecOps expert specialized in container security and vulnerability prioritization.
  Reclassify the remediation urgency of the vulnerability described below.

  Vulnerability Information:
  {input_framework}

  Note: The answer is probably NOT one of these categories: {rejected_category}.
  Reconsider your analysis carefully and choose a different priority if appropriate.

  Container-Aware Priority taxonomy:
  - Crítico-Container: CVSS ≥ 9.0 AND Solution Type = WillNotFix AND Port Protocol = tcp.
  - Alto-Remediável: CVSS ≥ 7.0 AND Solution Type = VendorFix.
  - Médio-Monitorar: CVSS ∈ [4.0, 7.0) OR exploitation requires specific conditions.
  - Baixo-Aceitar: CVSS < 4.0 OR QoD < 50.

  Think step by step:
  1. Re-extract CVSS score, Solution Type, Port Protocol, and QoD.
  2. Apply taxonomy rules, avoiding the rejected categories.
  3. Select the most appropriate remaining category.

  {output_format}

output_format: |
  Return your classification strictly in the format below.
  If classification is not possible, use Unknown.

  Category: [Crítico-Container|Alto-Remediável|Médio-Monitorar|Baixo-Aceitar|Unknown]
  Explanation: [Concise justification referencing CVSS, Solution Type, Port Protocol, and QoD]

key_words:
  Crítico-Container:
    - critical cvss
    - willnotfix
    - no vendor fix
    - tcp
    - unpatched critical
  Alto-Remediável:
    - high cvss
    - vendorfix
    - patch available
    - security update
    - official fix
  Médio-Monitorar:
    - medium cvss
    - requires conditions
    - workaround
    - mitigation
    - moderate impact
  Baixo-Aceitar:
    - low cvss
    - low confidence
    - informational
    - minimal risk
    - qod low
  Unknown:
    - unknown
    - unspecified

categories:
  - name: Crítico-Container
    description: >
      CVSS ≥ 9.0 AND Solution Type = WillNotFix AND Port Protocol = tcp.
      Unpatched critical vulnerability exposed on TCP in the container network.
  - name: Alto-Remediável
    description: >
      CVSS ≥ 7.0 AND Solution Type = VendorFix.
      High or critical severity with a vendor-provided patch available.
  - name: Médio-Monitorar
    description: >
      CVSS ∈ [4.0, 7.0) OR exploitation requires specific conditions.
      Medium risk or conditional exploitability — monitor and schedule.
  - name: Baixo-Aceitar
    description: >
      CVSS < 4.0 OR QoD < 50. Low risk or low detection confidence — accept or defer.

params:
  max_iter: 3
  quality_threshold: 1.0
  mode: prp

extraction:
  method: csv
  unknown_category: Unknown
