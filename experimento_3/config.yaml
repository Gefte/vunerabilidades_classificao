project:
  name: experimento_3
  description: >
    E3 — Ablation de Configurações de Input (Contribuição Metodológica): avalia o
    impacto da estrutura e riqueza do input nas técnicas de PE para classificação
    de severidade CVSS. Cinco configurações de entrada são testadas, desde texto
    mínimo (apenas NVT Name) até estruturado completo (todos os campos + CVSS numérico).
    Execute pg run repetindo com diferentes subsets de input_columns.
  created_at: '2026-05-18T23:13:01.924915'
  version: 1.0.0
data:
  input_columns:
  - NVT Name
  - Summary
  - Vulnerability Insight
  - CVEs
  - Port
  - Affected Software/OS
  - CVSS
  required_columns:
  - id
  - target
models:
- name: "qwen:0.5b"
  provider: ollama
  temperature: 0.2
  max_tokens: 2048
prompt:
  technique:
  - zeroshot
  - progressive_hint
  - self_hint
  - hypothesis_testing
  - progressive_rectification
  schema_dir: schema
output:
  format: csv
  save_metrics: true
  save_logs: true
