technique: self_hint_l2
name: "Self-Hint Prompting — Nível 2 (Domínio Adaptado)"
description: >
  SHP L2: Taxonomia CVSSv3 + contexto do domínio de vulnerabilidades OpenVAS
  nos prompts, com auto-reflexão iterativa. Adiciona conhecimento sobre a natureza
  dos dados do scanner. Hipótese: ganho adicional moderado sobre L1.
acronym: "SHP-L2"
strategy: self_hint

prompt_text: |
  You are a cybersecurity expert specialized in vulnerability assessment.
  You are analyzing data from OpenVAS/Greenbone vulnerability scanner reports for Docker containers.
  Classify the CVSSv3 severity level of the vulnerability described below.

  Vulnerability Scanner Data (OpenVAS/Greenbone):
  {input_framework}

  {plan_instructions}

  Note: This data comes from automated OpenVAS/Greenbone scans of Docker Hub containers.
  The numeric CVSS score is NOT provided — classify based on the textual description only.

  CVSSv3 Severity taxonomy:
  - Informational: CVSS 0.0 — diagnostic data, open ports, version banners, EOL detections.
  - Low: CVSS 0.1–3.9 — limited impact, local access or complex conditions required.
  - Medium: CVSS 4.0–6.9 — moderate impact, partial unauthorized access possible.
  - High: CVSS 7.0–8.9 — significant impact, remotely exploitable, privilege escalation.
  - Critical: CVSS 9.0–10.0 — maximum impact, RCE, no authentication required.

  Think step by step:
  1. Understand the vulnerability from the scanner output fields.
  2. Assess exploitability, attack vector, and complexity.
  3. Evaluate impact on confidentiality, integrity, and availability.
  4. Map to the appropriate CVSSv3 severity level.

  {output_format}

plan_instructions: >
  Let's first understand the problem and devise a plan to solve it step by step.
  Then, let's carry out the plan and solve the problem step by step.

output_format: |
  Return your classification strictly in the format below.
  If classification is not possible, use Unknown.

  Category: [Informational|Low|Medium|High|Critical|Unknown]
  Explanation: [Concise justification based on the vulnerability characteristics]

categories:
  - name: Informational
    description: >
      CVSS 0.0. OpenVAS diagnostic findings: open ports, service banners, version
      fingerprints, SSL info, EOL detections. Not an exploitable vulnerability.
  - name: Low
    description: >
      CVSS 0.1–3.9. Limited exploitability. Requires local access or complex conditions.
  - name: Medium
    description: >
      CVSS 4.0–6.9. Moderate risk. Partial unauthorized access under specific conditions.
  - name: High
    description: >
      CVSS 7.0–8.9. Significant risk. Remotely exploitable, privilege escalation.
  - name: Critical
    description: >
      CVSS 9.0–10.0. Maximum risk. RCE, no authentication required.

params:
  max_iter: 3
  quality_threshold: 1.0
  mode: shp

extraction:
  method: csv
  unknown_category: Unknown
