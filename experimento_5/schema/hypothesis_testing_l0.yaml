technique: hypothesis_testing_l0
name: "Hypothesis Testing Prompting — Nível 0 (Zero Adaptação)"
description: >
  HTP L0: Prompts HTP do domínio de incidentes de segurança (NIST SP 800-61r3)
  aplicados diretamente aos dados de vulnerabilidades OpenVAS sem adaptação.
  Simula transferência zero-shot cross-domain — hipótese: performance próxima ao aleatório.
acronym: "HTP-L0"
strategy: hypothesis_testing

prompt_text: |
  You are a cybersecurity analyst specialized in security incident response.

  Incident Description:
  {input_framework}

  Instructions:
  For NIST SP 800-61r3 severity category "{category}" (keywords: {keywords_str}), perform the following steps:

  1. True Hypothesis:
     - Assume this event belongs to this severity level.
     - Justify based on the description and the provided keywords.
     - Indicate whether the hypothesis is SUPPORTED or NOT SUPPORTED.

  2. False Hypothesis:
     - Assume this event does NOT belong to this severity level.
     - Justify based on the lack of evidence or contradictory characteristics.
     - Indicate whether the hypothesis is SUPPORTED or NOT SUPPORTED.

  Return the hypotheses in the following format:
      True Hypothesis: [SUPPORTED/NOT SUPPORTED]
      False Hypothesis: [SUPPORTED/NOT SUPPORTED]

  Final Classification Decision:
    - If the True Hypothesis is SUPPORTED and the False Hypothesis is NOT SUPPORTED:
      Category: {category}
      Explanation: [Justification for the chosen severity level]
    - Otherwise:
      Category: Unknown
      Explanation: Unknown

  {output_format}

output_format: |
  Return your classification strictly in the format below.
  If classification is not possible, use Unknown.

  Category: [Informational|Low|Medium|High|Critical|Unknown]
  Explanation: [Concise justification based on the incident characteristics]

key_words:
  Informational:
    - information gathering
    - reconnaissance
    - scanning
    - monitoring
    - no direct threat
    - passive
    - observation
  Low:
    - minor incident
    - limited scope
    - few systems
    - minimal impact
    - standard response
  Medium:
    - moderate incident
    - multiple systems
    - intervention required
    - escalation needed
    - some data affected
  High:
    - significant incident
    - data breach
    - system compromise
    - major impact
    - incident command
    - unauthorized access
  Critical:
    - catastrophic
    - widespread
    - critical infrastructure
    - crisis response
    - executive escalation
    - major exfiltration
  Unknown:
    - unknown
    - unspecified

categories:
  - name: Informational
    description: No direct threat. Information gathering or scanning activity.
  - name: Low
    description: Minor incident with limited scope. Minimal operational impact.
  - name: Medium
    description: Moderate incident affecting some systems. Requires prompt intervention.
  - name: High
    description: Significant incident with major impact. Data breach or system compromise.
  - name: Critical
    description: Catastrophic incident. Widespread compromise or critical infrastructure affected.

params:
  max_iter: 5
  quality_threshold: 1.0
  mode: htp

extraction:
  method: csv
  unknown_category: Unknown
