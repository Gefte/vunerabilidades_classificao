technique: progressive_rectification_l3
name: "Progressive Rectification Prompting — Nível 3 (Otimizado)"
description: >
  PRP L3: Prompts PRP completamente redesenhados para o domínio de vulnerabilidades
  em containers Docker (OpenVAS/Greenbone). Referência superior do E5 — representa
  o máximo ganho possível via adaptação de prompt PRP sem fine-tuning.
acronym: "PRP-L3"
strategy: progressive_rectification

prompt_text: |
  You are a cybersecurity expert specialized in vulnerability assessment for Docker containers.
  You are processing structured output from OpenVAS/Greenbone vulnerability scanner reports.
  Classify the CVSSv3 severity level of the vulnerability described below.

  Vulnerability Scanner Data (OpenVAS/Greenbone):
  {input_framework}

  Important: The numeric CVSS score is intentionally excluded. Classify based on textual fields only.

  CVSSv3 Severity taxonomy:
  - Informational: CVSS 0.0 — diagnostic data, open ports, version banners, EOL detections. Not exploitable.
  - Low: CVSS 0.1–3.9 — limited impact, local access or complex conditions required.
  - Medium: CVSS 4.0–6.9 — moderate impact, partial unauthorized access possible.
  - High: CVSS 7.0–8.9 — significant impact, remotely exploitable, privilege escalation.
  - Critical: CVSS 9.0–10.0 — maximum impact, RCE, no authentication required.

  Think step by step:
  1. Identify the vulnerability type from NVT Name and Summary.
  2. Assess impact on confidentiality, integrity, and availability.
  3. Consider attack vector, complexity, and privileges required.
  4. Map to the appropriate CVSSv3 severity level.

  {output_format}

masking_template: |
  {input_framework}
  Replace all occurrences of the word '{subcategory}' with 'X' in the vulnerability text above.
  Ensure the substitution preserves the original context and sentence structure.

rectification_template: |
  You are a cybersecurity expert analyzing OpenVAS/Greenbone scanner data for Docker containers.
  Reclassify the CVSSv3 severity of the vulnerability described below.

  Vulnerability Scanner Data:
  {input_framework}

  Note: The answer is probably NOT one of these categories: {rejected_category}.
  The numeric CVSS score is excluded — use the textual description only.

  CVSSv3 Severity taxonomy:
  - Informational: CVSS 0.0 — diagnostic data, open ports, version banners, EOL detections.
  - Low: CVSS 0.1–3.9 — limited impact, local access or complex conditions required.
  - Medium: CVSS 4.0–6.9 — moderate impact, partial unauthorized access possible.
  - High: CVSS 7.0–8.9 — significant impact, remotely exploitable, privilege escalation.
  - Critical: CVSS 9.0–10.0 — maximum impact, RCE, no authentication required.

  Think step by step:
  1. Re-assess the vulnerability type and impact.
  2. Avoid the rejected categories listed above.
  3. Select the most appropriate remaining CVSSv3 severity level.

  {output_format}

output_format: |
  Return your classification strictly in the format below.
  If classification is not possible, use Unknown.

  Category: [Informational|Low|Medium|High|Critical|Unknown]
  Explanation: [Concise justification based on the vulnerability characteristics]

key_words:
  Informational:
    - open port
    - service banner
    - version detected
    - fingerprint
    - informational
    - diagnostic
    - eol detection
    - port scan
    - ssl certificate
  Low:
    - local access required
    - complex conditions
    - limited impact
    - minimal damage
    - difficult to exploit
    - requires authentication
  Medium:
    - partial compromise
    - moderate impact
    - unauthorized access
    - xss
    - csrf
    - information disclosure
    - session hijacking
  High:
    - privilege escalation
    - data breach
    - exploitable remotely
    - authentication bypass
    - sql injection
    - command injection
  Critical:
    - remote code execution
    - rce
    - full system compromise
    - no authentication required
    - unauthenticated
    - arbitrary code
    - zero-day
  Unknown:
    - unknown
    - unspecified

categories:
  - name: Informational
    description: >
      CVSS 0.0. OpenVAS diagnostic findings: open ports, banners, EOL detections. Not exploitable.
  - name: Low
    description: >
      CVSS 0.1–3.9. Limited exploitability. Local access or complex attack conditions.
  - name: Medium
    description: >
      CVSS 4.0–6.9. Moderate risk. Partial unauthorized access under specific conditions.
  - name: High
    description: >
      CVSS 7.0–8.9. Significant risk. Remotely exploitable, privilege escalation.
  - name: Critical
    description: >
      CVSS 9.0–10.0. Maximum risk. RCE, no authentication required.

params:
  max_iter: 3
  quality_threshold: 1.0
  mode: prp

extraction:
  method: csv
  unknown_category: Unknown
