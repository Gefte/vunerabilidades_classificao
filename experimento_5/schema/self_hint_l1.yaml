technique: self_hint_l1
name: "Self-Hint Prompting — Nível 1 (Taxonomia Adaptada)"
description: >
  SHP L1: Prompts SHP com taxonomia trocada de NIST SP 800-61r3 para CVSSv3.
  Mantém estrutura de auto-reflexão e estilo orientado a incidentes. Hipótese:
  ganho significativo sobre L0 pela correção da taxonomia alvo.
acronym: "SHP-L1"
strategy: self_hint

prompt_text: |
  You are a cybersecurity analyst specialized in security incident response.
  Classify the severity level of the security finding described below.

  Finding Description:
  {input_framework}

  {plan_instructions}

  CVSSv3 Severity taxonomy:
  - Informational: CVSS 0.0 — no direct exploitable risk; diagnostic or scan data.
  - Low: CVSS 0.1–3.9 — minor risk with limited scope and minimal impact.
  - Medium: CVSS 4.0–6.9 — moderate risk requiring attention and intervention.
  - High: CVSS 7.0–8.9 — significant risk with major potential impact.
  - Critical: CVSS 9.0–10.0 — critical risk with catastrophic potential impact.

  Think step by step:
  1. Identify the type of security finding described.
  2. Assess scope, exploitability, and potential impact.
  3. Map to the appropriate CVSSv3 severity level.

  {output_format}

plan_instructions: >
  Let's first understand the problem and devise a plan to solve it step by step.
  Then, let's carry out the plan and solve the problem step by step.

output_format: |
  Return your classification strictly in the format below.
  If classification is not possible, use Unknown.

  Category: [Informational|Low|Medium|High|Critical|Unknown]
  Explanation: [Concise justification based on the finding characteristics]

categories:
  - name: Informational
    description: CVSS 0.0. No direct exploitable risk. Diagnostic or scan data.
  - name: Low
    description: CVSS 0.1–3.9. Minor risk with limited scope and minimal impact.
  - name: Medium
    description: CVSS 4.0–6.9. Moderate risk requiring attention and intervention.
  - name: High
    description: CVSS 7.0–8.9. Significant risk with major potential impact.
  - name: Critical
    description: CVSS 9.0–10.0. Critical risk with catastrophic potential impact.

params:
  max_iter: 3
  quality_threshold: 1.0
  mode: shp

extraction:
  method: csv
  unknown_category: Unknown
