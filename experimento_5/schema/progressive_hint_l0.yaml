technique: progressive_hint_l0
name: "Progressive Hint Prompting — Nível 0 (Zero Adaptação)"
description: >
  PHP L0: Prompts PHP do domínio de incidentes de segurança (NIST SP 800-61r3)
  aplicados diretamente aos dados de vulnerabilidades OpenVAS sem adaptação.
  Simula transferência zero-shot cross-domain — hipótese: performance próxima ao aleatório.
acronym: "PHP-L0"
strategy: progressive_hint

prompt_text: |
  You are a cybersecurity analyst specialized in security incident response.
  Classify the security incident described below according to the NIST SP 800-61r3 incident category taxonomy.

  Incident Description:
  {input_framework}

  NIST SP 800-61r3 Severity taxonomy:
  - Informational: No direct threat — monitoring, scanning, or information gathering.
  - Low: Minor incident with limited scope and minimal impact on operations.
  - Medium: Moderate incident affecting some systems or users, requiring intervention.
  - High: Significant incident with major impact — data breach, system compromise.
  - Critical: Catastrophic incident — widespread compromise, critical infrastructure affected.

  Think step by step:
  1. Identify the type of security event described.
  2. Assess the scope and potential impact on the organization.
  3. Consider the urgency of response required.
  4. Map to the appropriate NIST SP 800-61r3 severity level.

  {output_format}

hint_template: |
  You are a cybersecurity analyst specialized in security incident response.
  Classify the security incident described below according to the NIST SP 800-61r3 taxonomy.

  Incident Description:
  {input_framework}
  (Hint: The severity level is near to {previous_category}.)

  We know the Answer Hints: {previous_category}. With the Answer Hints: {previous_category}, we will answer the question.

  NIST SP 800-61r3 Severity taxonomy:
  - Informational: No direct threat — monitoring, scanning, or information gathering.
  - Low: Minor incident with limited scope and minimal impact on operations.
  - Medium: Moderate incident affecting some systems or users, requiring intervention.
  - High: Significant incident with major impact — data breach, system compromise.
  - Critical: Catastrophic incident — widespread compromise, critical infrastructure affected.

  Think step by step:
  1. Identify the type of security event.
  2. Assess the scope and potential impact.
  3. Use the hint as reference, but reason independently.
  4. Determine the final severity level.

  {output_format}

output_format: |
  Return your classification strictly in the format below.
  If classification is not possible, use Unknown.

  Category: [Informational|Low|Medium|High|Critical|Unknown]
  Explanation: [Concise justification based on the incident characteristics]

categories:
  - name: Informational
    description: No direct threat. Information gathering or scanning activity.
  - name: Low
    description: Minor incident with limited scope. Minimal operational impact.
  - name: Medium
    description: Moderate incident affecting some systems. Requires prompt intervention.
  - name: High
    description: Significant incident with major impact. Data breach or system compromise.
  - name: Critical
    description: Catastrophic incident. Widespread compromise or critical infrastructure affected.

params:
  max_hints: 3
  quality_threshold: 1.0
  mode: php

extraction:
  method: csv
  unknown_category: Unknown
