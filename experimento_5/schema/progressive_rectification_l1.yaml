technique: progressive_rectification_l1
name: "Progressive Rectification Prompting — Nível 1 (Taxonomia Adaptada)"
description: >
  PRP L1: Prompts PRP com taxonomia trocada de NIST SP 800-61r3 para CVSSv3.
  Mantém mascaramento progressivo de keywords e estilo orientado a incidentes.
  Hipótese: ganho significativo sobre L0 pela correção da taxonomia alvo.
acronym: "PRP-L1"
strategy: progressive_rectification

prompt_text: |
  You are a cybersecurity analyst specialized in security incident response.
  Classify the severity level of the security finding described below.

  Finding Description:
  {input_framework}

  CVSSv3 Severity taxonomy:
  - Informational: CVSS 0.0 — no direct exploitable risk; diagnostic or scan data.
  - Low: CVSS 0.1–3.9 — minor risk with limited scope and minimal impact.
  - Medium: CVSS 4.0–6.9 — moderate risk requiring attention and intervention.
  - High: CVSS 7.0–8.9 — significant risk with major potential impact.
  - Critical: CVSS 9.0–10.0 — critical risk with catastrophic potential impact.

  Think step by step:
  1. Identify the type of finding.
  2. Assess scope, exploitability, and impact.
  3. Map to CVSSv3 severity level.

  {output_format}

masking_template: |
  {input_framework}
  Replace all occurrences of the word '{subcategory}' with 'X' in the text above.

rectification_template: |
  You are a cybersecurity analyst specialized in security incident response.
  Reclassify the severity of the security finding described below.

  Finding Description:
  {input_framework}

  Note: The answer is probably NOT one of these categories: {rejected_category}.

  CVSSv3 Severity taxonomy:
  - Informational: CVSS 0.0 — no direct exploitable risk; diagnostic or scan data.
  - Low: CVSS 0.1–3.9 — minor risk with limited scope and minimal impact.
  - Medium: CVSS 4.0–6.9 — moderate risk requiring attention and intervention.
  - High: CVSS 7.0–8.9 — significant risk with major potential impact.
  - Critical: CVSS 9.0–10.0 — critical risk with catastrophic potential impact.

  {output_format}

output_format: |
  Return your classification strictly in the format below.
  If classification is not possible, use Unknown.

  Category: [Informational|Low|Medium|High|Critical|Unknown]
  Explanation: [Concise justification based on the finding characteristics]

key_words:
  Informational:
    - no exploitable risk
    - diagnostic
    - scan result
    - information gathering
  Low:
    - minor risk
    - limited scope
    - minimal impact
  Medium:
    - moderate risk
    - partial access
    - intervention required
  High:
    - significant risk
    - data breach
    - remotely exploitable
  Critical:
    - critical risk
    - catastrophic
    - rce
  Unknown:
    - unknown
    - unspecified

categories:
  - name: Informational
    description: CVSS 0.0. No direct exploitable risk. Diagnostic or scan data.
  - name: Low
    description: CVSS 0.1–3.9. Minor risk with limited scope and minimal impact.
  - name: Medium
    description: CVSS 4.0–6.9. Moderate risk requiring attention and intervention.
  - name: High
    description: CVSS 7.0–8.9. Significant risk with major potential impact.
  - name: Critical
    description: CVSS 9.0–10.0. Critical risk with catastrophic potential impact.

params:
  max_iter: 3
  quality_threshold: 1.0
  mode: prp

extraction:
  method: csv
  unknown_category: Unknown
