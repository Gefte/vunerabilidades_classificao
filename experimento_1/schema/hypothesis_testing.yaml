technique: hypothesis_testing
name: "Hypothesis Testing Prompting"
description: >
  Hypothesis Testing Prompting (HTP) para classificação de severidade CVSS de
  vulnerabilidades em containers Docker (OpenVAS/Greenbone). Testa sistematicamente
  hipóteses para cada nível de severidade CVSSv3 usando palavras-chave específicas,
  confirmando a categoria onde H_true é SUPPORTED e H_false é NOT SUPPORTED.
acronym: "HTP"
strategy: hypothesis_testing

prompt_text: |
  You are a cybersecurity expert specialized in vulnerability assessment for Docker containers.

  Vulnerability Information:
  {input_framework}

  Instructions:
  For severity category "{category}" (keywords: {keywords_str}), perform the following steps:

  1. True Hypothesis:
     - Assume the vulnerability belongs to this severity level.
     - Justify based on the description and the provided keywords.
     - Indicate whether the hypothesis is SUPPORTED or NOT SUPPORTED.

  2. False Hypothesis:
     - Assume the vulnerability does NOT belong to this severity level.
     - Justify based on the lack of evidence or contradictory characteristics.
     - Indicate whether the hypothesis is SUPPORTED or NOT SUPPORTED.

  Return the hypotheses in the following format:
      True Hypothesis: [SUPPORTED/NOT SUPPORTED]
      False Hypothesis: [SUPPORTED/NOT SUPPORTED]

  Final Classification Decision:
    - If the True Hypothesis is SUPPORTED and the False Hypothesis is NOT SUPPORTED, return:
      Category: {category}
      Explanation: [Justification for the chosen severity level]
    - Otherwise, return UNKNOWN:
      Category: Unknown
      Explanation: Unknown

  {output_format}

output_format: |
  Return your classification strictly in the format below.
  If classification is not possible, use Unknown.

  Category: [Informational|Low|Medium|High|Critical|Unknown]
  Explanation: [Concise justification based on the vulnerability characteristics]

key_words:
  Informational:
    - open port
    - service banner
    - version detected
    - fingerprint
    - host alive
    - ssl certificate
    - informational
    - diagnostic
    - metadata
    - scan result
    - end of life
    - eol detection
    - software version
    - port scan
    - banner grabbing
  Low:
    - local access required
    - complex conditions
    - limited impact
    - low risk
    - minimal damage
    - difficult to exploit
    - requires authentication
    - user interaction required
    - physical access
    - low cvss
    - minor vulnerability
  Medium:
    - partial compromise
    - moderate impact
    - unauthorized access
    - some conditions
    - credential exposure
    - cross-site scripting
    - xss
    - csrf
    - information disclosure
    - medium cvss
    - requires privileges
    - session hijacking
  High:
    - privilege escalation
    - data breach
    - service disruption
    - exploitable remotely
    - minimal privileges
    - significant impact
    - authentication bypass
    - sql injection
    - high cvss
    - remote exploit
    - directory traversal
    - command injection
  Critical:
    - remote code execution
    - rce
    - full system compromise
    - no authentication required
    - no user interaction
    - maximum impact
    - unauthenticated
    - arbitrary code
    - complete compromise
    - critical cvss
    - zero-day
    - wormable
  Unknown:
    - unknown
    - unspecified
    - not categorized
    - undefined

categories:
  - name: Informational
    description: >
      CVSS 0.0. Diagnostic data collected during scanning: open ports, service banners,
      version fingerprints, SSL certificate info, EOL detections. Not an exploitable vulnerability.
  - name: Low
    description: >
      CVSS 0.1–3.9. Limited impact. Exploitation requires local access, physical presence,
      or highly complex conditions. Minimal damage potential.
  - name: Medium
    description: >
      CVSS 4.0–6.9. Moderate impact. May allow partial unauthorized access, credential
      exposure, XSS, CSRF, or information disclosure under specific conditions.
  - name: High
    description: >
      CVSS 7.0–8.9. Significant impact. Data breach, privilege escalation, authentication
      bypass, SQL injection, or major service disruption. Often remotely exploitable.
  - name: Critical
    description: >
      CVSS 9.0–10.0. Maximum impact. Remote code execution, full system compromise,
      unauthenticated exploitation, arbitrary code execution with no user interaction.

params:
  max_iter: 5
  quality_threshold: 1.0
  mode: htp

extraction:
  method: csv
  unknown_category: Unknown
