technique: zeroshot
name: "Zero-Shot Learning"
description: >
  Zero-Shot Learning (ZSL) para classificação de severidade CVSS de vulnerabilidades
  em containers Docker (OpenVAS/Greenbone). Classificação direta sem exemplos,
  apenas com instrução e taxonomia CVSSv3. Serve como linha de base do experimento.
acronym: "ZSL"
strategy: zeroshot

prompt_text: |
  You are a cybersecurity expert specialized in vulnerability assessment for Docker containers.
  Classify the severity level of the vulnerability described below.

  Vulnerability Information:
  {input_framework}

  Severity taxonomy (CVSSv3):
  - Informational: CVSS 0.0 — diagnostic data, open ports, version banners, scanner metadata. Not an exploitable vulnerability.
  - Low: CVSS 0.1–3.9 — limited impact, requires local access or complex conditions.
  - Medium: CVSS 4.0–6.9 — moderate impact, may allow partial unauthorized access.
  - High: CVSS 7.0–8.9 — significant impact, data breach, privilege escalation, remotely exploitable.
  - Critical: CVSS 9.0–10.0 — maximum impact, RCE, full system compromise, no authentication required.

  Think step by step:
  1. Identify the vulnerability type and its root cause.
  2. Assess the potential impact on confidentiality, integrity, and availability.
  3. Consider the attack vector, complexity, and privileges required.
  4. Map to the appropriate CVSSv3 severity level.

  {output_format}

output_format: |
  Return your classification strictly in the format below.
  If classification is not possible, use Unknown.

  Category: [Informational|Low|Medium|High|Critical|Unknown]
  Explanation: [Concise justification based on the vulnerability characteristics]

categories:
  - name: Informational
    description: >
      CVSS 0.0. Diagnostic data collected during scanning: open ports, service banners,
      version fingerprints, SSL certificate info, EOL detections. Not an exploitable
      vulnerability — no direct security risk.
  - name: Low
    description: >
      CVSS 0.1–3.9. Limited impact. Exploitation typically requires local access,
      physical presence, or highly complex conditions. Minimal damage potential.
  - name: Medium
    description: >
      CVSS 4.0–6.9. Moderate impact. May allow partial unauthorized access, credential
      exposure, XSS, CSRF, or information disclosure under specific conditions.
  - name: High
    description: >
      CVSS 7.0–8.9. Significant impact. Can lead to data breach, privilege escalation,
      authentication bypass, SQL injection, or major service disruption. Often remotely exploitable.
  - name: Critical
    description: >
      CVSS 9.0–10.0. Maximum impact. Remote code execution, full system compromise,
      unauthenticated exploitation, arbitrary code execution with no user interaction.

params:
  mode: zsl

extraction:
  method: csv
  unknown_category: Unknown
